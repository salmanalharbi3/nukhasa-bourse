<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>بورصة النخاسة لتداول الرقيق</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', system-ui; }
    .gold { color: #facc15; text-shadow: 0 0 10px #facc15; }
    .live { animation: pulse 1.5s infinite; }
    .ticker { overflow: hidden; white-space: nowrap; }
    .price-up { animation: priceUp 0.6s; }
    .price-down { animation: priceDown 0.6s; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes priceUp { 0% { background: #052e16; } 100% { background: transparent; } }
    @keyframes priceDown { 0% { background: #450a0a; } 100% { background: transparent; } }
    
    /* تحسينات الموبايل فقط */
    .section { padding: 1rem; }
    table { font-size: 15px; }
    .nav-link { font-size: 15px; padding: 8px 12px; }
    button { font-size: 17px; padding: 14px 24px; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Top Ticker -->
  <div class="bg-black border-b border-yellow-500 py-2 text-sm font-mono overflow-hidden">
    <div id="ticker" class="ticker flex items-center gap-8 px-4"></div>
  </div>

  <!-- Navbar -->
  <nav class="bg-black border-b border-yellow-500 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-handshake text-4xl gold"></i>
        <div>
          <h1 class="text-2xl font-bold tracking-widest">بورصة النخاسة</h1>
          <span class="text-yellow-400 text-sm">لتداول الرقيق</span>
        </div>
      </div>
      <div class="flex items-center gap-2 bg-gray-900 px-4 py-2 rounded-3xl border border-yellow-500">
        <i class="fa-solid fa-coins gold"></i>
        <span id="balance" class="font-bold text-xl">٥٠,٠٠٠</span>
        <span class="text-yellow-400 text-xs">دينار</span>
      </div>
    </div>
    
    <!-- Mobile Navigation -->
    <div class="flex justify-around bg-black border-t border-yellow-500/30 py-2 text-sm">
      <a onclick="showSection('dashboard')" class="nav-link cursor-pointer flex flex-col items-center text-yellow-400"><i class="fa-solid fa-gauge-high mb-0.5"></i> اللوحة</a>
      <a onclick="showSection('market')" class="nav-link cursor-pointer flex flex-col items-center"><i class="fa-solid fa-chart-line mb-0.5"></i> السوق</a>
      <a onclick="showSection('portfolio')" class="nav-link cursor-pointer flex flex-col items-center"><i class="fa-solid fa-briefcase mb-0.5"></i> محفظتي</a>
      <a onclick="showSection('history')" class="nav-link cursor-pointer flex flex-col items-center"><i class="fa-solid fa-clock-rotate-left mb-0.5"></i> السجل</a>
    </div>
  </nav>

  <!-- Dashboard -->
  <div id="dashboard" class="section max-w-7xl mx-auto">
    <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><i class="fa-solid fa-gauge-high live"></i> لوحة التحكم</h2>
    
    <div class="grid grid-cols-2 gap-4">
      <div class="bg-gray-900 rounded-3xl p-5 border border-yellow-500/30">
        <p class="text-yellow-400 text-sm">إجمالي الثروة</p>
        <p id="total-wealth" class="text-4xl font-bold gold">٥٠,٠٠٠</p>
      </div>
      <div class="bg-gray-900 rounded-3xl p-5 border border-yellow-500/30">
        <p class="text-yellow-400 text-sm">قيمة المحفظة</p>
        <p id="portfolio-value" class="text-4xl font-bold text-green-400">٠</p>
      </div>
      <div class="bg-gray-900 rounded-3xl p-5 border border-yellow-500/30">
        <p class="text-yellow-400 text-sm">عدد الرقيق</p>
        <p id="total-owned" class="text-4xl font-bold">٠</p>
      </div>
      <div class="bg-gray-900 rounded-3xl p-5 border border-yellow-500/30">
        <p class="text-yellow-400 text-sm">حجم التداول اليوم</p>
        <p id="daily-volume" class="text-4xl font-bold text-yellow-400">١٢٤,٨٠٠</p>
      </div>
    </div>

    <button onclick="importNewSlave()" 
            class="mt-6 w-full bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-black py-5 rounded-3xl font-bold text-xl flex items-center justify-center gap-3">
      <i class="fa-solid fa-ship"></i> 
      استيراد رقيق جديد (٥٠٠٠ دينار)
    </button>
  </div>

  <!-- Market -->
  <div id="market" class="section max-w-7xl mx-auto hidden">
    <h2 class="text-3xl font-bold mb-6 flex items-center gap-3"><i class="fa-solid fa-fire-flame-curved live"></i> السوق المباشر</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-right border-collapse">
        <thead>
          <tr class="bg-gray-900 text-yellow-400 border-b border-yellow-500">
            <th class="p-3">الرقم</th>
            <th class="p-3">الرقيق</th>
            <th class="p-3">السعر</th>
            <th class="p-3">متاح</th>
            <th class="p-3">الإجراء</th>
          </tr>
        </thead>
        <tbody id="market-table" class="text-lg"></tbody>
      </table>
    </div>
  </div>

  <!-- Portfolio -->
  <div id="portfolio" class="section max-w-7xl mx-auto hidden">
    <h2 class="text-3xl font-bold mb-6">محفظتي من الرقيق</h2>
    <div id="portfolio-list" class="grid grid-cols-1 gap-5"></div>
  </div>

  <!-- History -->
  <div id="history" class="section max-w-7xl mx-auto hidden">
    <h2 class="text-3xl font-bold mb-6">سجل التداولات</h2>
    <div id="history-list" class="space-y-4"></div>
  </div>

  <!-- Modal -->
  <div id="slave-modal" onclick="if(event.target===this)hideModal()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
    <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl w-full max-w-md p-6">
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    // ==================== البيانات ====================
    let slaves = [
      { id: 1, name: "زيد الزنجي", importer: "حماد بن محمد", origin: "زنجبار", basePrice: 8500, stock: 12, skills: "قوي • زراعة", desc: "عمر ٢٨" },
      { id: 2, name: "فاطمة الحبشية", importer: "سعيد قاسم", origin: "الحبشة", basePrice: 12000, stock: 8, skills: "طبخ • خدمة", desc: "عمر ٢٢" },
      { id: 3, name: "عمر النويبي", importer: "باسودان الحضرمي", origin: "السودان", basePrice: 6300, stock: 15, skills: "حدادة • نجارة", desc: "عمر ٣٥" },
      { id: 4, name: "مريم الزنجية", importer: "الصافي الحضرمي", origin: "تنزانيا", basePrice: 9500, stock: 6, skills: "رقص • غناء", desc: "عمر ١٩" },
      { id: 5, name: "خالد البربري", importer: "عبد الله بن جدعان", origin: "شمال أفريقيا", basePrice: 11000, stock: 9, skills: "حارس شخصي", desc: "عمر ٣١" },
      { id: 6, name: "ليلى السودانية", importer: "حماد بن محمد", origin: "السودان", basePrice: 7800, stock: 11, skills: "مربية", desc: "عمر ٢٤" },
      { id: 7, name: "سليمان اليافعي", importer: "باسودان الحضرمي", origin: "اليمن", basePrice: 14000, stock: 4, skills: "تاجر ذكي", desc: "عمر ٢٩" },
      { id: 8, name: "نورة الحبشية", importer: "سعيد قاسم", origin: "الحبشة", basePrice: 10500, stock: 7, skills: "خياطة", desc: "عمر ٢١" },
      
      // العبيد الجدد الذين طلبت إضافتهم
      { id: 9, name: "جلاحكو", importer: "عبدالله نائف", origin: "بريدة", basePrice: 4500, stock: 6, skills: "خدوم • زراعة", desc: "مواليد بريدة • عمر ٢٣ • تابع لسيده عبدالله نائف" },
      { id: 10, name: "جلوي", importer: "مازن أبو شوعود", origin: "بريدة", basePrice: 3200, stock: 9, skills: "خدوم • مساعد منزلي", desc: "مواليد بريدة • مجهول العمر • خدوم جداً" },
      { id: 11, name: "مشاري بجاد", importer: "مازن أبو شوعود", origin: "بريدة", basePrice: 5800, stock: 5, skills: "شاب نشيط • خدمة", desc: "مواليد بريدة • عمر ١٨" },
      { id: 12, name: "متعب", importer: "من الكويت", origin: "الكويت", basePrice: 999, stock: 25, skills: "الأرخص • خدوم متعدد", desc: "مواليد الكويت • مجهول العمر • الأهم والأرخص في السوق!" }
    ];

    let currentPrices = {};
    let priceHistory = {};
    let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
    let balance = parseInt(localStorage.getItem('balance')) || 50000;
    let history = JSON.parse(localStorage.getItem('history')) || [];

    // ==================== صوت النطق الغبي المضحك ====================
    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ar-SA';
      utterance.rate = 1.35;   // سرعة غبية سريعة
      utterance.pitch = 1.55;  // طبقة عالية مضحكة
      utterance.volume = 1.0;
      window.speechSynthesis.speak(utterance);
    }

    // ==================== باقي الكود (محدث) ====================
    function updatePrices() {
      slaves.forEach(slave => {
        if (!currentPrices[slave.id]) currentPrices[slave.id] = slave.basePrice;
        if (!priceHistory[slave.id]) priceHistory[slave.id] = [slave.basePrice];

        const changePercent = (Math.random() * 14 - 7);
        const newPrice = Math.max(500, Math.floor(currentPrices[slave.id] * (1 + changePercent/100)));
        const isUp = newPrice > currentPrices[slave.id];

        currentPrices[slave.id] = newPrice;
        priceHistory[slave.id].push(newPrice);
        if (priceHistory[slave.id].length > 20) priceHistory[slave.id].shift();
      });
      renderAll();
      renderTicker();
    }

    function renderTicker() {
      const ticker = document.getElementById('ticker');
      ticker.innerHTML = slaves.map(s => {
        const p = currentPrices[s.id];
        const ch = ((p - s.basePrice) / s.basePrice * 100).toFixed(1);
        return `<span class="flex items-center gap-2 mx-6 ${ch >= 0 ? 'text-green-400' : 'text-red-400'}">
          ${s.name} <span class="font-bold">${p.toLocaleString()}</span> <span class="text-xs">(${ch}%)</span>
        </span>`;
      }).join('');
    }

    function renderMarket() {
      const tbody = document.getElementById('market-table');
      tbody.innerHTML = '';
      slaves.forEach(slave => {
        const price = currentPrices[slave.id];
        const change = ((price - slave.basePrice) / slave.basePrice * 100).toFixed(1);
        const isUp = change >= 0;
        const row = document.createElement('tr');
        row.className = `border-b border-gray-700 hover:bg-gray-800`;
        row.innerHTML = `
          <td class="p-3 font-mono">#${slave.id}</td>
          <td class="p-3 font-bold cursor-pointer" onclick="showSlave(${slave.id})">${slave.name}</td>
          <td class="p-3 font-bold gold">${price.toLocaleString()} د</td>
          <td class="p-3 font-bold ${slave.stock > 0 ? 'text-green-400' : 'text-red-400'}">${slave.stock}</td>
          <td class="p-3">
            <button onclick="buySlave(${slave.id}); event.stopImmediatePropagation()" 
                    class="bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-black px-6 py-2.5 rounded-2xl font-bold text-sm ${slave.stock === 0 ? 'opacity-40' : ''}"
                    ${slave.stock === 0 ? 'disabled' : ''}>
              شراء
            </button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function buySlave(id) {
      const slave = slaves.find(s => s.id === id);
      const price = currentPrices[id];
      if (slave.stock <= 0) return alert("نفد المخزون!");
      if (balance < price) return alert("رصيدك غير كافٍ!");

      balance -= price;
      slave.stock--;
      
      const existing = portfolio.find(p => p.id === id);
      if (existing) {
        existing.owned++;
        existing.buyPrices.push(price);
      } else {
        portfolio.push({ ...slave, owned: 1, buyPrices: [price] });
      }
      
      history.unshift({ type: 'شراء', name: slave.name, price, qty: 1, time: new Date().toLocaleString('ar-SA') });
      
      saveData();
      renderAll();
      
      // الصوت التلقائي الغبي المضحك
      speak("شريتني ! أنتَ سيدي ! أحبك !");
      
      alert(`✅ اشتريت ${slave.name}`);
    }

    function sellSlave(index) {
      const item = portfolio[index];
      const currentPrice = currentPrices[item.id] || item.basePrice;
      const sellValue = currentPrice * item.owned;
      
      balance += sellValue;
      history.unshift({ type: 'بيع', name: item.name, price: currentPrice, qty: item.owned, time: new Date().toLocaleString('ar-SA') });
      
      const originalSlave = slaves.find(s => s.id === item.id);
      if (originalSlave) originalSlave.stock += Math.floor(item.owned / 2);
      
      portfolio.splice(index, 1);
      
      saveData();
      renderAll();
      
      // الصوت التلقائي الغبي المضحك
      speak("بعتني !؟ ليه جذي ؟ أكرهك!");
      
      alert(`✅ بعت ${item.name} بـ ${sellValue.toLocaleString()} دينار`);
    }

    function showSlave(id) {
      const slave = slaves.find(s => s.id === id);
      const price = currentPrices[id];
      const modal = document.getElementById('modal-content');

      modal.innerHTML = `
        <div class="flex justify-between mb-5">
          <h3 class="text-3xl font-bold">${slave.name}</h3>
          <button onclick="hideModal()" class="text-3xl">✕</button>
        </div>
        <div>
          <p class="text-5xl font-bold gold mb-1">${price.toLocaleString()} دينار</p>
          <p class="text-sm text-gray-400 mb-6">متاح: <span class="text-green-400">${slave.stock}</span></p>
          
          <button onclick="buySlave(${id});hideModal()" 
                  class="w-full py-5 text-2xl font-bold bg-yellow-500 hover:bg-yellow-400 active:bg-yellow-600 text-black rounded-3xl mb-6">
            شراء الآن
          </button>
          
          <div class="text-sm space-y-2 text-gray-300">
            <p><span class="text-yellow-400">المستورد:</span> ${slave.importer}</p>
            <p><span class="text-yellow-400">الأصل:</span> ${slave.origin}</p>
            <p><span class="text-yellow-400">المهارات:</span> ${slave.skills}</p>
            <p class="pt-2">${slave.desc}</p>
          </div>
        </div>
      `;
      document.getElementById('slave-modal').classList.remove('hidden');
      document.getElementById('slave-modal').classList.add('flex');
    }

    function hideModal() {
      const m = document.getElementById('slave-modal');
      m.classList.add('hidden');
      m.classList.remove('flex');
    }

    function renderPortfolio() {
      const container = document.getElementById('portfolio-list');
      container.innerHTML = portfolio.length === 0 
        ? `<p class="text-center text-2xl py-16 text-gray-400">ابدأ التداول من السوق...</p>` : '';

      portfolio.forEach((item, i) => {
        const current = currentPrices[item.id];
        const totalValue = current * item.owned;
        const card = document.createElement('div');
        card.className = "bg-gray-900 rounded-3xl p-6 border border-yellow-500/30";
        card.innerHTML = `
          <div class="flex justify-between items-start mb-4">
            <div>
              <h4 class="text-2xl font-bold">${item.name}</h4>
              <p class="text-yellow-400">×${item.owned} وحدة</p>
            </div>
            <div class="text-right">
              <p class="text-3xl gold">${totalValue.toLocaleString()} د</p>
            </div>
          </div>
          <button onclick="sellSlave(${i});" 
                  class="w-full bg-red-600 hover:bg-red-500 active:bg-red-700 py-4 rounded-3xl font-bold text-xl">
            بيع الكمية كاملة
          </button>
        `;
        container.appendChild(card);
      });
    }

    function renderHistory() {
      const container = document.getElementById('history-list');
      container.innerHTML = history.length === 0 ? `<p class="text-center text-gray-400 py-12">لا معاملات بعد</p>` : '';
      history.slice(0, 15).forEach(h => {
        const div = document.createElement('div');
        div.className = `flex justify-between bg-gray-900 p-5 rounded-3xl border-l-8 ${h.type==='شراء'?'border-red-400':'border-green-400'}`;
        div.innerHTML = `
          <div>
            <span class="font-bold">${h.type} → ${h.name}</span>
            <p class="text-sm text-gray-400">${h.time}</p>
          </div>
          <div class="text-2xl font-bold ${h.type==='شراء'?'text-red-400':'text-green-400'}">
            ${h.type==='شراء'?'-':'+'}${h.price.toLocaleString()}
          </div>
        `;
        container.appendChild(div);
      });
    }

    function calculateWealth() {
      let portfolioValue = 0;
      let totalOwned = 0;
      portfolio.forEach(item => {
        portfolioValue += (currentPrices[item.id] || item.basePrice) * item.owned;
        totalOwned += item.owned;
      });
      const totalWealth = balance + portfolioValue;
      document.getElementById('total-wealth').textContent = totalWealth.toLocaleString();
      document.getElementById('portfolio-value').textContent = portfolioValue.toLocaleString();
      document.getElementById('total-owned').textContent = totalOwned;
    }

    function saveData() {
      localStorage.setItem('portfolio', JSON.stringify(portfolio));
      localStorage.setItem('balance', balance);
      localStorage.setItem('history', JSON.stringify(history));
    }

    function renderAll() {
      document.getElementById('balance').textContent = balance.toLocaleString();
      calculateWealth();
      renderMarket();
      renderPortfolio();
      renderHistory();
    }

    function showSection(sec) {
      document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
      document.getElementById(sec).classList.remove('hidden');
      renderAll();
    }

    function importNewSlave() {
      if (balance < 5000) return alert("رصيدك غير كافٍ!");
      balance -= 5000;
      const newSlave = {...slaves[Math.floor(Math.random()*slaves.length)]};
      newSlave.id = Math.max(...slaves.map(s=>s.id)) + 1;
      newSlave.name = newSlave.name + " (جديد)";
      newSlave.stock = Math.floor(Math.random()*8) + 4;
      newSlave.basePrice = Math.floor(newSlave.basePrice * (1 + Math.random()*0.25));
      slaves.push(newSlave);
      currentPrices[newSlave.id] = newSlave.basePrice;
      priceHistory[newSlave.id] = [newSlave.basePrice];
      saveData();
      renderAll();
      alert("✅ تم استيراد رقيق جديد!");
    }

    function init() {
      updatePrices();
      setInterval(updatePrices, 4000);
      setInterval(renderTicker, 4500);
      renderAll();
      showSection('dashboard');
    }

    window.onload = init;
  </script>
</body>
</html>
