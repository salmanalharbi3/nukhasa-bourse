<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بورصة النخاسة لتداول الرقيق</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    body { font-family: 'Cairo', system-ui; }
    .gold { color: #facc15; }
    .live { animation: pulse 2s infinite; }
    .table-row { transition: all 0.3s; }
    .table-row:hover { background-color: #1f2937; transform: scale(1.02); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <nav class="bg-black border-b border-yellow-500 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-handshake text-4xl gold"></i>
        <h1 class="text-3xl font-bold tracking-widest">بورصة النخاسة</h1>
        <span class="text-xl text-yellow-400">لتداول الرقيق</span>
      </div>
      <div class="flex items-center gap-8 text-lg">
        <a onclick="showSection('market')" class="cursor-pointer hover:text-yellow-400 flex items-center gap-2"><i class="fa-solid fa-chart-line"></i> السوق</a>
        <a onclick="showSection('portfolio')" class="cursor-pointer hover:text-yellow-400 flex items-center gap-2"><i class="fa-solid fa-briefcase"></i> محفظتي</a>
        <a onclick="showSection('history')" class="cursor-pointer hover:text-yellow-400 flex items-center gap-2"><i class="fa-solid fa-clock-rotate-left"></i> السجل</a>
        <div class="flex items-center gap-2 bg-gray-900 px-5 py-2 rounded-3xl border border-yellow-500">
          <i class="fa-solid fa-coins gold"></i>
          <span id="balance" class="font-bold text-xl">٥٠,٠٠٠</span>
          <span class="text-yellow-400 text-sm">دينار ذهبي</span>
        </div>
      </div>
    </div>
  </nav>

  <div id="market" class="section max-w-7xl mx-auto p-6">
    <h2 class="text-4xl font-bold mb-8 flex items-center gap-3"><i class="fa-solid fa-fire-flame-curved live"></i> السوق المباشر - أسعار حية</h2>
    <div class="overflow-x-auto">
      <table class="w-full text-right border-collapse">
        <thead>
          <tr class="bg-gray-900 text-yellow-400 border-b border-yellow-500">
            <th class="p-4">الرقم</th>
            <th class="p-4">الرقيق</th>
            <th class="p-4">مستورد بواسطة</th>
            <th class="p-4">الأصل</th>
            <th class="p-4">السعر الحالي</th>
            <th class="p-4">التغير %</th>
            <th class="p-4">الإجراء</th>
          </tr>
        </thead>
        <tbody id="market-table" class="text-lg"></tbody>
      </table>
    </div>
  </div>

  <div id="portfolio" class="section max-w-7xl mx-auto p-6 hidden">
    <h2 class="text-4xl font-bold mb-8">محفظتي من الرقيق</h2>
    <div id="portfolio-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <div id="history" class="section max-w-7xl mx-auto p-6 hidden">
    <h2 class="text-4xl font-bold mb-8">سجل التداولات</h2>
    <div id="history-list" class="space-y-4"></div>
  </div>

  <div id="slave-modal" onclick="if(event.target===this)hideModal()" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl max-w-2xl w-full mx-4 p-8">
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    let slaves = [
      { id: 1, name: "زيد الزنجي", importer: "حماد بن محمد (تيبو تيب)", origin: "شرق أفريقيا - زنجبار", basePrice: 8500, skills: "قوي البنية، ماهر في الزراعة والحراسة", desc: "مستورد حديثاً، عمر ٢٨ سنة، صحة ممتازة" },
      { id: 2, name: "فاطمة الحبشية", importer: "سعيد قاسم الصعيدي", origin: "الحبشة", basePrice: 12000, skills: "خبيرة في الطبخ والخدمة المنزلية", desc: "جميلة ومطيعة، عمر ٢٢ سنة" },
      { id: 3, name: "عمر النويبي", importer: "باسودان الحضرمي", origin: "السودان", basePrice: 6300, skills: "حرفي في الحدادة والنجارة", desc: "عمر ٣٥ سنة، قوي التحمل" },
      { id: 4, name: "مريم الزنجية", importer: "الصافي الحضرمي", origin: "تنزانيا", basePrice: 9500, skills: "راقصة ومغنية موهوبة", desc: "عمر ١٩ سنة، جذابة جداً" },
      { id: 5, name: "خالد البربري", importer: "عبد الله بن جدعان", origin: "شمال أفريقيا", basePrice: 11000, skills: "حارس شخصي مخلص", desc: "عمر ٣١ سنة، مخضرم في القتال" },
      { id: 6, name: "ليلى السودانية", importer: "حماد بن محمد (تيبو تيب)", origin: "السودان", basePrice: 7800, skills: "خادمة ماهرة ومربية أطفال", desc: "عمر ٢٤ سنة" },
      { id: 7, name: "سليمان اليافعي", importer: "باسودان الحضرمي", origin: "اليمن - زنجبار", basePrice: 14000, skills: "تاجر صغير سابق، ذكي جداً", desc: "عمر ٢٩ سنة" },
      { id: 8, name: "نورة الحبشية", importer: "سعيد قاسم الصعيدي", origin: "الحبشة", basePrice: 10500, skills: "خياطة وتطريز فاخر", desc: "عمر ٢١ سنة" }
    ];

    let currentPrices = {};
    let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
    let balance = parseInt(localStorage.getItem('balance')) || 50000;
    let history = JSON.parse(localStorage.getItem('history')) || [];

    function updatePrices() {
      slaves.forEach(slave => {
        if (!currentPrices[slave.id]) currentPrices[slave.id] = slave.basePrice;
        const change = (Math.random() * 12 - 6).toFixed(2);
        currentPrices[slave.id] = Math.max(2000, Math.floor(currentPrices[slave.id] * (1 + parseFloat(change)/100)));
      });
      renderMarket();
    }

    function renderMarket() {
      const tbody = document.getElementById('market-table');
      tbody.innerHTML = '';
      slaves.forEach(slave => {
        const price = currentPrices[slave.id];
        const change = ((price - slave.basePrice) / slave.basePrice * 100).toFixed(1);
        const isUp = change >= 0;
        const row = document.createElement('tr');
        row.className = `table-row border-b border-gray-700 hover:bg-gray-800`;
        row.innerHTML = `
          <td class="p-4 font-mono">#${slave.id}</td>
          <td class="p-4 font-bold cursor-pointer" onclick="showSlave(${slave.id})">${slave.name}</td>
          <td class="p-4 text-yellow-400">${slave.importer}</td>
          <td class="p-4">${slave.origin}</td>
          <td class="p-4 font-bold gold">${price.toLocaleString()} دينار</td>
          <td class="p-4 ${isUp ? 'text-green-400' : 'text-red-400'}">
            ${isUp ? '▲' : '▼'} ${Math.abs(change)}%
          </td>
          <td class="p-4">
            <button onclick="buySlave(${slave.id}); event.stopImmediatePropagation()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-2 rounded-2xl font-bold text-sm transition">شراء الآن</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    function buySlave(id) {
      const slave = slaves.find(s => s.id === id);
      const price = currentPrices[id];
      if (balance < price) return alert("رصيدك غير كافٍ يا تاجر!");
      balance -= price;
      portfolio.push({ ...slave, buyPrice: price, buyTime: new Date().toLocaleString('ar-SA') });
      history.unshift({ type: 'شراء', name: slave.name, price: price, time: new Date().toLocaleString('ar-SA') });
      saveData();
      renderAll();
      alert(`✅ تم شراء ${slave.name} بنجاح!`);
    }

    function sellSlave(index) {
      const item = portfolio[index];
      const currentPrice = currentPrices[item.id] || item.buyPrice;
      balance += currentPrice;
      history.unshift({ type: 'بيع', name: item.name, price: currentPrice, time: new Date().toLocaleString('ar-SA') });
      portfolio.splice(index, 1);
      saveData();
      renderAll();
      alert(`✅ تم بيع ${item.name} بـ ${currentPrice} دينار`);
    }

    function showSlave(id) {
      const slave = slaves.find(s => s.id === id);
      const price = currentPrices[id];
      const modal = document.getElementById('modal-content');
      modal.innerHTML = `
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-3xl font-bold">${slave.name}</h3>
          <button onclick="hideModal()" class="text-3xl text-gray-400 hover:text-white">✕</button>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div>
            <p class="text-yellow-400 mb-2">مستورد بواسطة:</p>
            <p class="text-xl">${slave.importer}</p>
            <p class="text-yellow-400 mt-6 mb-2">الأصل:</p>
            <p class="text-xl">${slave.origin}</p>
            <p class="text-yellow-400 mt-6 mb-2">المهارات:</p>
            <p class="text-xl">${slave.skills}</p>
          </div>
          <div class="bg-black/50 rounded-2xl p-6">
            <p class="text-4xl font-bold gold text-center mb-2">${price.toLocaleString()} دينار</p>
            <p class="text-center text-sm text-gray-400">السعر الحالي في السوق</p>
            <button onclick="buySlave(${id}); hideModal()" class="mt-8 w-full bg-yellow-500 hover:bg-yellow-400 text-black py-4 text-2xl font-bold rounded-3xl transition">اشترِ الآن</button>
          </div>
        </div>
        <p class="mt-8 text-gray-300">${slave.desc}</p>
      `;
      document.getElementById('slave-modal').classList.remove('hidden');
      document.getElementById('slave-modal').classList.add('flex');
    }

    function hideModal() {
      const modal = document.getElementById('slave-modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    function renderPortfolio() {
      const container = document.getElementById('portfolio-list');
      container.innerHTML = portfolio.length === 0 
        ? `<p class="text-center text-2xl text-gray-400 py-12">لا يوجد لديك رقيق بعد... ابدأ التداول من السوق!</p>`
        : '';
      portfolio.forEach((item, i) => {
        const current = currentPrices[item.id] || item.buyPrice;
        const profit = current - item.buyPrice;
        const card = document.createElement('div');
        card.className = "bg-gray-900 rounded-3xl p-6 border border-yellow-500/30";
        card.innerHTML = `
          <div class="flex justify-between">
            <div>
              <h4 class="text-2xl font-bold">${item.name}</h4>
              <p class="text-yellow-400">${item.importer}</p>
            </div>
            <div class="text-right">
              <p class="text-3xl gold">${current.toLocaleString()}</p>
              <p class="text-sm ${profit >= 0 ? 'text-green-400' : 'text-red-400'}">${profit >= 0 ? '+' : ''}${profit} دينار</p>
            </div>
          </div>
          <button onclick="sellSlave(${i})" class="mt-6 w-full bg-red-600 hover:bg-red-500 py-3 rounded-2xl font-bold">بيع الآن</button>
        `;
        container.appendChild(card);
      });
    }

    function renderHistory() {
      const container = document.getElementById('history-list');
      container.innerHTML = history.length === 0 
        ? `<p class="text-center text-gray-400">لا توجد معاملات بعد</p>` : '';
      history.forEach(h => {
        const div = document.createElement('div');
        div.className = `flex justify-between items-center bg-gray-900 p-5 rounded-2xl border-l-8 ${h.type === 'شراء' ? 'border-green-400' : 'border-red-400'}`;
        div.innerHTML = `
          <div>
            <span class="font-bold text-xl">${h.type} → ${h.name}</span>
            <p class="text-sm text-gray-400">${h.time}</p>
          </div>
          <div class="text-right">
            <span class="text-3xl font-bold ${h.type === 'شراء' ? 'text-red-400' : 'text-green-400'}">
              ${h.type === 'شراء' ? '-' : '+'}${h.price.toLocaleString()}
            </span>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function saveData() {
      localStorage.setItem('portfolio', JSON.stringify(portfolio));
      localStorage.setItem('balance', balance);
      localStorage.setItem('history', JSON.stringify(history));
    }

    function renderAll() {
      document.getElementById('balance').textContent = balance.toLocaleString();
      renderMarket();
      renderPortfolio();
      renderHistory();
    }

    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
      document.getElementById(section).classList.remove('hidden');
      renderAll();
    }

    function init() {
      tailwind.config = { content: ["*"] };
      updatePrices();
      setInterval(updatePrices, 4000);
      renderAll();
      showSection('market');
    }

    window.onload = init;
  </script>
</body>
</html>
